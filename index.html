<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>UNEMI <span class="highlight">| Portal</span></h1>
    </header>

    <main>
        <section class="container">
            <div class="card">
                <div class="card-header">
                    <h2>Crear Cuenta</h2>
                    <p>Únete a nuestra comunidad hoy mismo</p>
                </div>
                <form id="registroForm" action="#" method="POST" novalidate>
                    <div class="input-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez">
                        <span class="error-text" id="error-nombre"></span>
                    </div>

                    <div class="input-group">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com">
                        <span class="error-text" id="error-correo"></span>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••">
                            <button type="button" class="toggle-password" id="togglePassword">🙈</button>
                        </div>
                        <span class="error-text" id="error-password"></span>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••">
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">🙈</button>
                        </div>
                        <span class="error-text" id="error-confirmPassword"></span>
                    </div>

                    <div class="input-group">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" name="edad" min="18" max="99" placeholder="18 a 99 años">
                        <span class="error-text" id="error-edad"></span>
                    </div>
                    <button type="submit" id="btnEnviar">Registrarse</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alberto Rodríguez - Estudiante de Ingeniería de Software</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
